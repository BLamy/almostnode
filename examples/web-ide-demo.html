<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web IDE Demo - almostnode</title>
    <link
      rel="icon"
      href="/favicon.svg"
      type="image/svg+xml"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --page-bg: #071018;
        --header-bg: rgba(5, 9, 14, 0.9);
        --panel-border: rgba(255, 255, 255, 0.08);
        --panel-bg: #0d141d;
        --panel-alt: #111b27;
        --text: #e6edf7;
        --muted: #8ca0bb;
        --accent: #ff7a59;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        font-family: 'Instrument Sans', system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 122, 89, 0.14), transparent 24rem),
          linear-gradient(180deg, #06101a 0%, var(--page-bg) 100%);
      }

      .webide-shell {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 100dvh;
      }

      .webide-header {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        padding: 0.95rem 1.2rem;
        border-bottom: 1px solid var(--panel-border);
        background: var(--header-bg);
        backdrop-filter: blur(18px);
      }

      .webide-mark {
        width: 2.6rem;
        height: 2.6rem;
        border-radius: 0.85rem;
        background: linear-gradient(145deg, rgba(255, 122, 89, 0.95), rgba(255, 195, 82, 0.9));
        color: #111923;
        font-weight: 800;
        display: grid;
        place-items: center;
        flex: none;
      }

      .webide-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }

      .webide-subtitle {
        margin: 0.15rem 0 0;
        font-size: 0.86rem;
        color: var(--muted);
      }

      .webide-header code,
      .almostnode-preview-surface__status,
      .almostnode-terminal-surface__status {
        font-family: 'IBM Plex Mono', monospace;
      }

      .webide-header code {
        font-size: 0.76rem;
        color: var(--accent);
      }

      .webide-body {
        min-height: 0;
        padding: 0.95rem;
      }

      #webideWorkbench {
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 1px solid var(--panel-border);
        border-radius: 1rem;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
      }

      .almostnode-preview-editor-pane,
      .almostnode-preview-editor-host,
      .almostnode-files-tree-host,
      .almostnode-files-tree,
      .almostnode-preview-surface,
      .almostnode-preview-surface__body,
      .almostnode-terminal-panel-host,
      .almostnode-terminal-surface,
      .almostnode-terminal-surface__body {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
      }

      .almostnode-preview-surface,
      .almostnode-files-tree,
      .almostnode-terminal-surface {
        display: flex;
        flex-direction: column;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
          var(--panel-bg);
      }

      .almostnode-files-tree {
        gap: 0.15rem;
        overflow: auto;
        padding: 0.55rem 0.45rem 0.85rem;
      }

      .almostnode-files-tree__directory {
        border-radius: 0.45rem;
      }

      .almostnode-files-tree__summary,
      .almostnode-files-tree__file {
        display: flex;
        align-items: center;
        width: 100%;
        min-width: 0;
        border: 0;
        border-radius: 0.45rem;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 0.83rem;
        padding: 0.38rem 0.55rem;
        text-align: left;
      }

      .almostnode-files-tree__summary {
        cursor: pointer;
        font-weight: 600;
        list-style: none;
      }

      .almostnode-files-tree__summary::-webkit-details-marker {
        display: none;
      }

      .almostnode-files-tree__summary::before {
        content: '▾';
        color: var(--muted);
        margin-right: 0.45rem;
      }

      .almostnode-files-tree__directory:not([open]) > .almostnode-files-tree__summary::before {
        content: '▸';
      }

      .almostnode-files-tree__children {
        display: grid;
        gap: 0.12rem;
        margin-left: 0.85rem;
      }

      .almostnode-files-tree__file {
        cursor: pointer;
        color: var(--muted);
      }

      .almostnode-files-tree__empty {
        color: var(--muted);
        font-size: 0.8rem;
        padding: 0.45rem 0.55rem;
      }

      .almostnode-files-tree__summary:hover,
      .almostnode-files-tree__file:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
      }

      .almostnode-preview-surface__toolbar,
      .almostnode-terminal-surface__status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.55rem 0.85rem;
        border-bottom: 1px solid var(--panel-border);
        background: rgba(255, 255, 255, 0.02);
      }

      .almostnode-preview-surface__status,
      .almostnode-terminal-surface__status {
        min-width: 0;
        font-size: 0.74rem;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .almostnode-preview-surface__actions {
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }

      .almostnode-terminal-surface__tabs,
      .almostnode-terminal-surface__actions {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .almostnode-terminal-surface__tabs {
        min-width: 0;
        flex: 1 1 auto;
        overflow-x: auto;
        scrollbar-width: thin;
      }

      .almostnode-terminal-surface__tab,
      .almostnode-terminal-surface__new-tab,
      .almostnode-terminal-surface__tab-close {
        appearance: none;
        border: 1px solid var(--panel-border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font: inherit;
      }

      .almostnode-terminal-surface__tab {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        border-radius: 999px;
        padding: 0.32rem 0.55rem 0.32rem 0.7rem;
        cursor: pointer;
      }

      .almostnode-terminal-surface__tab.is-active {
        border-color: rgba(255, 122, 89, 0.45);
        background: rgba(255, 122, 89, 0.14);
        color: var(--text);
      }

      .almostnode-terminal-surface__tab-label {
        white-space: nowrap;
      }

      .almostnode-terminal-surface__tab-close,
      .almostnode-terminal-surface__new-tab {
        border-radius: 999px;
        width: 1.6rem;
        height: 1.6rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .almostnode-terminal-surface__tab-close {
        padding: 0;
        font-size: 0.72rem;
      }

      .almostnode-terminal-surface__new-tab:hover,
      .almostnode-terminal-surface__tab:hover,
      .almostnode-terminal-surface__tab-close:hover {
        border-color: rgba(255, 122, 89, 0.45);
        color: var(--text);
      }

      .almostnode-terminal-surface__terminal {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
      }

      .almostnode-preview-surface__button {
        appearance: none;
        border: 1px solid var(--panel-border);
        border-radius: 0.55rem;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
        font-size: 0.74rem;
        font-weight: 600;
        padding: 0.38rem 0.72rem;
        cursor: pointer;
      }

      .almostnode-preview-surface__button:hover {
        border-color: rgba(255, 122, 89, 0.45);
        background: rgba(255, 122, 89, 0.12);
      }

      .almostnode-preview-surface__body {
        position: relative;
        background:
          radial-gradient(circle at top left, rgba(255, 122, 89, 0.16), transparent 18rem),
          #ffffff;
      }

      .almostnode-preview-surface__empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        text-align: center;
        color: #44536a;
        font-size: 0.95rem;
        background:
          radial-gradient(circle at top left, rgba(255, 122, 89, 0.18), transparent 18rem),
          linear-gradient(180deg, #fff9f7 0%, #eef3f8 100%);
      }

      .almostnode-preview-surface__frame {
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      #webideTerminal {
        flex: 1;
        overflow: hidden;
        padding: 0.35rem;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
          #071018;
      }

      #webideTerminal > .xterm {
        width: 100%;
        height: 100%;
      }

      #webideTerminal .xterm .scrollbar.vertical {
        visibility: visible !important;
        opacity: 1 !important;
        width: 12px !important;
        right: 1px !important;
      }

      #webideTerminal .xterm .scrollbar.vertical .slider {
        border-radius: 999px;
        background: rgba(255, 122, 89, 0.28) !important;
      }

      #webideTerminal .xterm .scrollbar.vertical .slider:hover,
      #webideTerminal .xterm .scrollbar.vertical .slider.active {
        background: rgba(255, 122, 89, 0.5) !important;
      }

      #webideTerminal .xterm .xterm-selection div {
        background: rgba(255, 122, 89, 0.34) !important;
      }

      @media (max-width: 760px) {
        .webide-header {
          align-items: flex-start;
        }

        .webide-body {
          padding: 0.75rem;
        }

        .almostnode-preview-surface__toolbar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="webide-shell">
      <header class="webide-header">
        <div class="webide-mark">A</div>
        <div>
          <h1 class="webide-title">almostnode VS Code-compatible workbench</h1>
          <p class="webide-subtitle">Files, search, extensions, command palette, real workbench panels, and a draggable preview editor on top of <code>file:///project</code>.</p>
        </div>
      </header>

      <main class="webide-body">
        <div id="webideWorkbench"></div>
      </main>
    </div>

    <script
      type="module"
      src="/src/web-ide-demo-entry.ts"
    ></script>
  </body>
</html>
