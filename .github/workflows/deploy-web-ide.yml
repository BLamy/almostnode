name: Deploy Web IDE Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-web-ide
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install vendored OpenCode/OpenTUI dependencies
        run: pnpm vendor:install:opencode

      - name: Build web-ide
        run: pnpm nx build web-ide
        env:
          GITHUB_PAGES: true

      - name: Prepare web-ide deploy directory
        run: |
          mkdir -p deploy
          cp apps/web-ide/dist-site/web-ide-demo.html deploy/index.html
          # Copy all shared assets (JS chunks, CSS, wasm, etc.)
          cp -r apps/web-ide/dist-site/assets deploy/assets
          # Copy service worker and other root-level files needed at runtime
          cp apps/web-ide/dist-site/__sw__.js deploy/__sw__.js
          cp apps/web-ide/dist-site/favicon.svg deploy/favicon.svg
          # Copy PGlite WASM assets needed at runtime
          cp apps/web-ide/dist-site/pglite.wasm deploy/pglite.wasm
          cp apps/web-ide/dist-site/pglite.data deploy/pglite.data

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
